name: npm deprecate

# Manual workflow to mark a published version as deprecated on npm.
# Use when a release shipped with a bug and we want users to skip it.
# Runs `npm deprecate @fuzeelogik/myflo@<version> "<message>"` via NPM_TOKEN.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Exact version to deprecate (e.g. 1.0.0)'
        required: true
      message:
        description: 'Deprecation message shown to npm users'
        required: true

jobs:
  deprecate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Deprecate
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PKG_VERSION: ${{ inputs.version }}
          DEPRECATE_MSG: ${{ inputs.message }}
        run: npm deprecate "@fuzeelogik/myflo@$PKG_VERSION" "$DEPRECATE_MSG"
      - name: Verify
        env:
          PKG_VERSION: ${{ inputs.version }}
        # Registry caches can lag a few seconds after deprecate. Retry briefly.
        run: |
          for i in 1 2 3 4 5; do
            DEP=$(npm view "@fuzeelogik/myflo@$PKG_VERSION" deprecated 2>&1 || echo "")
            if [ -n "$DEP" ]; then
              echo "✓ @fuzeelogik/myflo@$PKG_VERSION deprecated: $DEP"
              exit 0
            fi
            echo "  (attempt $i/5: not yet propagated, waiting 5s...)"
            sleep 5
          done
          echo "::error::deprecation did not propagate after 25s"
          exit 1
